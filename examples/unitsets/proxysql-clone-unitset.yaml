# ProxySQL Clone UnitSet Example
#
# This example demonstrates how to deploy a ProxySQL UnitSet
#
# ProxySQL is a high-performance database proxy for MySQL and MySQL Group Replication
#
# Architecture Overview:
#   - UnitSet is a cluster-scoped resource that manages multiple Units
#   - Unit represents an individual ProxySQL instance
#   - Controller automatically creates necessary resources: ConfigMaps, Services, Pods, etc.
#
# Resource Configuration:
#   - Uses emptyDir for storage (temporary storage, data is lost when Pod is deleted)
#   - For persistent storage, use storage field instead of emptyDir
#
# Label Usage:
#   - upm.api/service-group.name: Service group name, identifies a set of related units
#   - upm.api/service-group.type: Service group type (e.g., mysql-sg, postgresql-sg)
#   - upm.api/service.type: Service type (e.g., proxysql)
#   - upm.io/owner: Resource owner

---
# ProxySQL Authentication Secret
# Stores credentials required for ProxySQL admin interface and database connections
# Note: Replace with actual Base64-encoded passwords for production deployment
apiVersion: v1
kind: Secret
metadata:
  name: proxysql-secret
  namespace: default
  labels:
    # Labels for service group identification
    upm.api/service-group.name: proxysql-cluster
    upm.api/service-group.type: proxysql-sg
    upm.io/owner: upm
data:
  # Administrator username (plaintext: admin)
  admin: YWRtaW4=
  # Administrator password (plaintext: admin_password)
  admin-password: YWRtaW5fcGFzc3dvcmQ=
type: Opaque

---
# ProxySQL UnitSet Resource Configuration
#
# UnitSet is a Kubernetes custom resource for managing distributed database units
# Core capabilities:
#   - Declarative management of multiple Unit (Pod) desired states
#   - Automatic configuration management, resource synchronization, storage orchestration
#   - Support for rolling updates, elastic scaling, and high-availability deployments
#
# Controller Behavior:
#   1. Create ConfigMap (copy from template)
#   2. Create Headless Service (for inter-Unit communication)
#   3. Create External Service (optional, for external access)
#   4. Create Unit Services (optional, one Service per Unit)
#   5. Create Units (each Unit corresponds to one Pod)
#   6. Synchronize configuration, resources, labels to Units
#   7. Optionally create PodMonitor (for Prometheus monitoring)
#
# Important: finalizers are automatically added by the Webhook, no need to specify
apiVersion: upm.syntropycloud.io/v1alpha2
kind: UnitSet
metadata:
  name: proxysql-cluster
  namespace: default
  labels:
    # Service group name; UnitSets in the same group share the same name prefix
    upm.api/service-group.name: proxysql-cluster
    # Service group type, identifies the database type
    upm.api/service-group.type: proxysql-sg
    # Service type, identifies the specific service
    upm.api/service.type: proxysql
    # Resource owner identifier
    upm.io/owner: upm
spec:
  # type: Database type; supported: mysql, postgresql, proxysql, redis, mongodb, milvus, etc.
  type: proxysql

  # version: ProxySQL version number
  # Must match an existing PodTemplate version in the upm-system namespace
  version: "2.7.2"

  # units: Number of units, defines how many Unit instances to create
  # Each Unit corresponds to one Pod
  # +kubebuilder:validation:Minimum=1
  units: 2

  # resources: Container resource requests and limits
  # Defines CPU and memory resources for the main container (named same as type)
  resources:
    limits:
      cpu: "1"
      memory: 2Gi
    requests:
      cpu: "1"
      memory: 1Gi

  # resizePolicy: Container resource resize policy
  # Defines container behavior when resources change
  # Supports cpu and memory resource resize policies
  # Note: This feature requires Kubernetes 1.27+
  # resizePolicy:
  #   - resourceName: cpu
  #     restartPolicy: NotRequired
  #   - resourceName: memory
  #     restartPolicy: NotRequired

  # env: Environment variables, passed to all containers
  # Used for configuring database connection parameters
  env:
    # Administrator username
    - name: ADM_USER
      value: admin
    # Monitor username
    - name: MON_USER
      value: monitor

  # extraVolume: Extra volume configuration (optional)
  # Used for mounting ConfigMaps, Secrets, etc. as volumes
  # To mount a Secret, use volume type "Secret" with secretName
  # extraVolume:
  #   - volume:
  #       name: secret
  #       secret:
  #         secretName: proxysql-secret
  #     volumeMountPath: /SECRET_MOUNT

  # storage: Persistent storage configuration (optional)
  # When specified, Controller creates PVCs and mounts them to containers
  # During UnitSet updates, Controller checks if PVC capacity matches the desired state
  # storage:
  #   - name: data
  #     mountPath: /DATA_MOUNT
  #     size: 10Gi
  #     storageClassName: standard

  # emptyDir: Temporary storage configuration (optional)
  # Uses Kubernetes emptyDir volume; data is lost when Pod is deleted
  # Cannot be used together with storage
  emptyDir:
    - name: data
      mountPath: /DATA_MOUNT
      size: 5Gi

  # externalService: External service configuration (optional)
  # Exposes the service for access outside the cluster
  # Supported types: ClusterIP (default), NodePort, LoadBalancer, ExternalName
  # externalService:
  #   type: NodePort

  # unitService: Unit service configuration (optional)
  # Creates an independent Service for each Unit
  # Supported types: ClusterIP (default), NodePort, LoadBalancer, ExternalName
  # unitService:
  #   type: ClusterIP

  # updateStrategy: Update strategy (optional)
  # Defines how to perform rolling updates or resource changes
  updateStrategy:
    # type: Update type; supported: RollingUpdate, OnDelete
    type: RollingUpdate
    rollingUpdate:
      # partition: Partition index for canary deployments
      # When set to N, Units with index >= N are updated first
      # +kubebuilder:validation:Minimum=0
      partition: 0
      # maxUnavailable: Maximum number of unavailable Units during update
      # +kubebuilder:validation:Minimum=0
      maxUnavailable: 1

  # nodeAffinityPreset: Node affinity preset (optional)
  # Schedules Pods to specific nodes
  # Matches nodes by kubernetes.io/hostname label
  nodeAffinityPreset:
    # key: Node label key
    # values: List of allowed label values (OR relationship)
    - key: upm.api/software.proxysql
      values:
        - "true"

  # podAntiAffinityPreset: Pod anti-affinity policy (optional)
  # soft: Prefer spreading Pods across different nodes
  # hard: Must spread Pods across different nodes
  # Note: When using this field, it is recommended that number of nodes >= units
  # podAntiAffinityPreset: soft

  # podMonitor: Prometheus monitoring configuration (optional)
  # When enable: true, Controller creates PodMonitor resource
  # Used for Prometheus auto-discovery and metrics scraping
  # podMonitor:
  #   enable: true
  #   endpoints:
  #     - port: metrics
  #       relabelConfigs:
  #         - targetLabel: instance
  #           replacement: proxysql

  # extraVolume: Extra volume configuration (optional)
  # Used for mounting ConfigMaps, Secrets, etc. as volumes
  # extraVolume:
  #   - volume:
  #       name: config
  #       configMap:
  #         name: proxysql-config
  #     volumeMountPath: /etc/proxysql

  # certificateProfile: Certificate configuration (optional)
  # Used for configuring TLS certificates
  # Requires cert-manager to be installed in the cluster
  # certificateProfile:
  #   organizations:
  #     - my-org
  #   rootSecret: ca-secret

---
# Deployment Instructions:
#
# 1. Apply Secret:
#    kubectl apply -f proxysql-clone-unitset.yaml
#
# 2. View UnitSet status:
#    kubectl get unitset proxysql-cluster -o yaml
#
# 3. View created Units:
#    kubectl get units -l upm.api/service-group.name=proxysql-cluster
#
# 4. View Unit status:
#    kubectl get units -l upm.api/service-group.name=proxysql-cluster -o wide
#
# 5. View Pods:
#    kubectl get pods -l upm.api/service-group.name=proxysql-cluster
#
# 6. Delete resources:
#    kubectl delete unitset proxysql-cluster
#    kubectl delete secret proxysql-secret

---
# Status Fields (Status):
#
# conditions: Resource condition array
#   - type: Condition type (e.g., Ready, Updating)
#   - status: True/False/Unknown
#   - reason: Condition reason
#   - message: Condition details
#
# units: Current total number of Units
# readyUnits: Number of ready Units
#
# inUpdate: Comma-separated list of Unit names currently being updated
#
# unitPVCSynced: PVC synchronization status
#   - status: "True" indicates all PVC capacities match the desired state
#   - lastTransitionTime: Status transition timestamp
#
# unitImageSynced: Image synchronization status
#   - status: "True" indicates all Unit image versions are synchronized
#   - lastTransitionTime: Status transition timestamp
#
# unitResourceSynced: Resource synchronization status
#   - status: "True" indicates all Unit resource limits and requests are synchronized
#   - lastTransitionTime: Status transition timestamp
#
# externalService: External service information
#   - name: External Service name
#
# unitService: Unit-to-Service mapping
#   - name: map[string]string, key is Unit name, value is Service name
